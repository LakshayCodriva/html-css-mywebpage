<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registration-Form</title>
</head>

<body bgcolor="lightgray">
    <h1>Registration Form</h1>
    <div id ="form-container">
        <form action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="John Doe"><br><br>

        <!-- I used Chatgpt to generate the regex pattern for email and password validation -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="test@codriva.com" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Password(8-16)" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,16}$"><br><br>

        <label for="city">Choose city:</label>
        <select id="city" name="city" required>
            <option value="New York">New York</option>
            <option value="Los Angeles">Los Angeles</option>
            <option value="Chicago">Chicago</option>
        </select><br><br>

        <label for="gender">Gender:<br>
            <input type="radio" name="gender" value="male" required>
            Male
        </label>
        <label>
            <input type="radio" name="gender" value="female" required>
            Female
        </label>
        <br>

        <label for="preferences">Programming Skills:</label>
        <label for="Python">
            <input type="checkbox" name="Programming-Skills" value="Python">
            Python
        </label>
        
        <label for="JavaScript">
            <input type="checkbox" name="Programming-Skills" value="JavaScript">
            JavaScript
        </label>
        
        <label for="Java">
            <input type="checkbox" name="Programming-Skills" value="Java">
            Java
        </label>
        <br>

        <input type="submit" value="Register">
    </form>   
    </div> 
</body>
</html>
